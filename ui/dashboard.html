<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Agniva Hait — Full Stack Developer. I build systems, not just apps." />
  <meta name="theme-color" content="#050508" />
  <title>Agniva · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./dashboard.css" />
</head>
<body>

  <!-- Ambient background -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="panel-divider" aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════
       APP SHELL
  ════════════════════════════════════════════ -->
  <div id="app" role="main">

    <!-- ── LEFT: Dashboard Panel ── -->
    <aside id="dashboard-panel" aria-label="Developer Dashboard">
      <!-- Populated by dashboard.js -->
    </aside>

    <!-- ── RIGHT: Terminal Panel ── -->
    <section id="terminal-panel" aria-label="Interactive Terminal">

      <!-- Terminal chrome header -->
      <header class="terminal-header">
        <div class="terminal-dots" aria-hidden="true">
          <span class="t-dot red"></span>
          <span class="t-dot yellow"></span>
          <span class="t-dot green"></span>
        </div>
        <span class="terminal-title">agniva@portfolio — zsh · ~/</span>
        <span class="terminal-badge">● LIVE</span>
      </header>

      <!-- Output area -->
      <div id="terminal-output" role="log" aria-live="polite" aria-label="Terminal output"></div>

      <!-- Input bar -->
      <div class="terminal-input-bar">
        <label for="terminal-input" class="input-prompt-label" aria-label="Terminal prompt">
          <span class="pu">agniva</span><span class="pa">@</span><span class="ph">portfolio</span><span class="pp">:~</span><span class="ps">$</span>
        </label>
        <input
          id="terminal-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          aria-label="Terminal command input"
          placeholder="type a command…"
        />
        <span class="cursor-blink" aria-hidden="true"></span>
      </div>

    </section>
  </div>

  <!-- ── Module bootstrap ── -->
  <script type="module" src="./layout.js"></script>
</body>
</html>
